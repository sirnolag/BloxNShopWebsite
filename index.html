  <script>

    const universeId = "5650985756";

    function formatNumber(num) {
      if (num >= 1000000) {
        return (num / 1000000).toFixed(1).replace(".0", "") + "M";
      }

      if (num >= 1000) {
        return (num / 1000).toFixed(1).replace(".0", "") + "k";
      }

      return num;
    }

    fetch(`./game.php?universeId=${universeId}`)
      .then(response => {
        console.log("Status:", response.status);
        return response.json();
      })
      .then(data => {

        console.log("Roblox data:", data);

        const game = data.data[0];

        document.getElementById("players").innerText = formatNumber(game.playing);
        document.getElementById("visits").innerText = formatNumber(game.visits);
        document.getElementById("likes").innerText = formatNumber(game.favoritedCount);

      })
      .catch(error => {
        console.error(error);
      });
  </script>
